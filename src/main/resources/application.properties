spring.application.name=auth-service

server.port=8082

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
management.endpoints.web.exposure.include=health,info

spring.datasource.url=jdbc:postgresql://localhost:5433/auth_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# No fixed issuer-uri: realms are created per enterprise at runtime.
# See TenantAwareIssuerResolver — it trusts the master realm plus any
# realm matching an existing enterprise slug.
keycloak.server-url=http://localhost:9090
keycloak.master-realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.username=admin
keycloak.admin.password=admin